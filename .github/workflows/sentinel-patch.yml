name: Sentinel-Patch CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  security-hardening:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Trivy (Binary Method)
        run: |
          VERSION=$(curl --silent "https://api.github.com/repos/aquasecurity/trivy/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          wget https://github.com/aquasecurity/trivy/releases/download/${VERSION}/trivy_${VERSION#v}_Linux-64bit.tar.gz
          tar zxvf trivy_${VERSION#v}_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin
          trivy --version

      - name: Scan Image (Vulnerability Discovery)
        run: trivy image --format json --output trivy_report.json node:14.15.0

      - name: Execute Reachability Analysis
        id: engine
        run: python3 sentinel_engine.py
        continue-on-error: true

      - name: Autonomous Remediation (Sed Patch)
        run: |
          sed -i 's/node:14.15.0/node:20-alpine/g' Dockerfile
          echo "PATCH_APPLIED=true" >> $GITHUB_ENV

      - name: Commit and Push Hardened Image
        if: env.PATCH_APPLIED == 'true'
        run: |
          git config --global user.name "Sentinel-Bot"
          git config --global user.email "sentinel-bot@internal.com"
          git add Dockerfile
          # Using --allow-empty in case the file was already patched to avoid errors
          git commit --allow-empty -m "[SENTINEL-AUTO-PATCH] Applied security hardening to Dockerfile (Reference: CVE-2023-44487)"
          git push