name: Sentinel-Patch CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  security-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Legacy Client View
        run: python3 legacy_reporter.py

      - name: Execution Autonomous Remediation
        run: sed -i 's/node:14.15.0/node:20-alpine/g' Dockerfile

      - name: Scan Phase 2 (Verification)
        run: trivy image --format json --output trivy_post_patch.json node:20-alpine

      - name: Execute Sentinel Engine
        run: python3 sentinel_engine.py

      - name: Upload Comparison Reports
        uses: actions/upload-artifact@v4
        with:
          name: comparison-reports
          path: |
            LEGACY_CLIENT_DASHBOARD.html
            SECURITY_AUDIT.html

      - name: Install Trivy
        run: |
          VERSION=$(curl --silent "https://api.github.com/repos/aquasecurity/trivy/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          wget -q https://github.com/aquasecurity/trivy/releases/download/${VERSION}/trivy_${VERSION#v}_Linux-64bit.tar.gz
          tar zxf trivy_${VERSION#v}_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin/

      - name: Scan Phase 1 (Baseline)
        run: trivy image --format json --output trivy_pre_patch.json node:14.15.0

      - name: Execution-Autonomous Remediation
        run: sed -i 's/node:14.15.0/node:20-alpine/g' Dockerfile

      - name: Scan Phase 2 (Verification)
        run: trivy image --format json --output trivy_post_patch.json node:20-alpine

      - name: Execute Sentinel Engine
        run: python3 sentinel_engine.py

      - name: Upload HTML Audit Report
        # This makes the report downloadable from the Actions run
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: SECURITY_AUDIT.html

      - name: Publish Action Summary
        run: cat TSB_SUMMARY.md >> $GITHUB_STEP_SUMMARY

      - name: Create Patch PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "[SENTINEL] Mitigate reachability path vulnerabilities"
          branch: sentinel-patch-fix
          title: "[SECURITY] Automated Base Image Hardening"
          body: |
            ## Automated Security Remediation
            The Sentinel-Patch Reachability Engine has identified critical vulnerabilities in the `node:14.15.0` base image that are exploitable in the current runtime path.
            
            ### Analysis Summary
            - **Noise Reduction:** Successfully filtered dormant vulnerabilities.
            - **Action Taken:** Migrated Dockerfile base to `node:20-alpine`.
            
            ### Developer Integration Workflow
            To pull these fixes into your local environment for review:
            
            1. **Fetch the remediation branch:**
               ```bash
               git fetch origin sentinel-patch-fix
               ```
            2. **Review the changes:**
               ```bash
               git diff main origin/sentinel-patch-fix
               ```
            3. **Merge the patch into your work:**
               ```bash
               git merge origin/sentinel-patch-fix
               ```
            
            *A detailed **HTML Audit Report** with full CVE mapping has been generated. You can download it from the **Artifacts** section of the associated CI run.*
            - name: Scan Phase 1 (Baseline)
        run: trivy image --format json --output trivy_pre_patch.json node:14.15.0

