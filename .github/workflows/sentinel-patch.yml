name: Sentinel-Patch CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  security-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. INSTALL TOOLS
      - name: Install Trivy
        run: |
          VERSION=$(curl --silent "https://api.github.com/repos/aquasecurity/trivy/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          wget -q https://github.com/aquasecurity/trivy/releases/download/${VERSION}/trivy_${VERSION#v}_Linux-64bit.tar.gz
          tar zxf trivy_${VERSION#v}_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin/

      # 2. BASELINE SCAN (The Problem)
      - name: Scan Phase 1 (Baseline)
        run: trivy image --format json --output trivy_pre_patch.json node:14.15.0

      # 3. GENERATE COMPARISON DATA
      - name: Generate Legacy Client View
        run: python3 legacy_reporter.py

      # 4. REMEDIATION
      - name: Execution Autonomous Remediation
        run: sed -i 's/node:14.15.0/node:20-alpine/g' Dockerfile

      # 5. VERIFICATION SCAN (The Solution)
      - name: Scan Phase 2 (Verification)
        run: trivy image --format json --output trivy_post_patch.json node:20-alpine

      # 6. ANALYZE & GENERATE FINAL REPORT
      - name: Execute Sentinel Engine
        run: python3 sentinel_engine.py

      # 7. UPLOAD ALL REPORTS
      - name: Upload Comparison Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            LEGACY_CLIENT_DASHBOARD.html
            SECURITY_AUDIT.html

      - name: Publish Action Summary
        run: cat TSB_SUMMARY.md >> $GITHUB_STEP_SUMMARY

      # 8. OPEN PULL REQUEST
      - name: Create Patch PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "[SENTINEL] Mitigate reachability path vulnerabilities"
          branch: sentinel-patch-fix
          title: "[SECURITY] Automated Base Image Hardening"
          body: |
            ## Automated Security Remediation
            The Sentinel-Patch Reachability Engine has identified critical vulnerabilities in the `node:14.15.0` base image.
            
            ### Developer Integration Workflow
            1. **Fetch:** `git fetch origin sentinel-patch-fix`
            2. **Review:** `git diff main origin/sentinel-patch-fix`
            3. **Merge:** `git merge origin/sentinel-patch-fix`
            
            *Detailed HTML reports (Legacy vs Sentinel) are available in the CI Run artifacts.*