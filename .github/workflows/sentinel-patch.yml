name: Sentinel-Patch CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  security-hardening:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/dabest.gpg | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Image (Vulnerability Discovery)
        # We scan the node:14.15.0 image and save findings to a JSON file
        run: trivy image --format json --output trivy_report.json node:14.15.0

      - name: Execute Reachability Analysis
        id: engine
        run: python3 sentinel_engine.py
        continue-on-error: true # We expect the script to exit with 10 (patch required)

      - name: Autonomous Remediation (Sed Patch)
        # This step only runs if the engine determines a patch is needed
        run: |
          sed -i 's/node:14.15.0/node:20-alpine/g' Dockerfile
          echo "PATCH_APPLIED=true" >> $GITHUB_ENV

      - name: Commit and Push Hardened Image
        if: env.PATCH_APPLIED == 'true'
        run: |
          git config --global user.name "Sentinel-Bot"
          git config --global user.email "sentinel-bot@internal.com"
          git add Dockerfile
          git commit -m "[SENTINEL-AUTO-PATCH] Applied security hardening to Dockerfile (Reference: CVE-2023-44487)"
          git push