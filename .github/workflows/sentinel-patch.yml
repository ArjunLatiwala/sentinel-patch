name: Sentinel-Patch CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  security-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Trivy
        run: |
          VERSION=$(curl --silent "https://api.github.com/repos/aquasecurity/trivy/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          wget -q https://github.com/aquasecurity/trivy/releases/download/${VERSION}/trivy_${VERSION#v}_Linux-64bit.tar.gz
          tar zxf trivy_${VERSION#v}_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin/

      - name: Scan Baseline (Pre-patch)
        run: trivy image --format json --output trivy_pre_patch.json node:14.15.0

      - name: Apply Patch
        run: sed -i 's/node:14.15.0/node:20-alpine/g' Dockerfile

      - name: Scan Hardened (Post-patch)
        run: trivy image --format json --output trivy_post_patch.json node:20-alpine

      - name: Run Sentinel Engine
        run: python3 sentinel_engine.py

      - name: Publish Dashboard
        run: cat TSB_REPORT.md >> $GITHUB_STEP_SUMMARY

      - name: Create Patch PR
        # This step will only run if the Dockerfile was actually changed
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "[SENTINEL-AUTO-PATCH] Hardened base image"
          branch: sentinel-patch-fix
          title: "🛡️ [SECURITY] Automated Base Image Hardening"
          body: "The Sentinel-Patch engine detected 3 reachable vulnerabilities in node:14.15.0. This PR migrates the environment to node:20-alpine."